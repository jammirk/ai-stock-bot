name: AI Stock Bot

on:
  schedule:
    - cron: '25 2 * * 1-5'   # 08:55 AM IST (PRE)
    - cron: '45 3 * * 1-5'   # 09:15 AM IST (LIVE)
    - cron: '15 10 * * 1-5'  # 03:45 PM IST (POST)
    - cron: '*/30 2-10 * * 1-5'  # Every 30 minutes during business hours
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python scanner.py
